name: PR Check
on: [pull_request]
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2

      - name: make test
        run: |
          make test

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    env:
      GOFLAGS: '-buildvcs=false'
      GOTOOLCHAIN: 'auto'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.21.1
        with:
          args: './...'

  depscheck:
    name: depscheck
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2

      - name: make depscheck
        run: |
          make depscheck
